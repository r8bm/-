name: Build Delivery APKs

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Prepare Flutter projects
        run: ./scripts/prepare_flutter_projects.sh

      - name: Build driver APK
        run: ./scripts/build_driver_apk.sh

      - name: Build restaurant APK
        run: ./scripts/build_restaurant_apk.sh

      - name: Upload APK files
        uses: actions/upload-artifact@v4
        with:
          name: delivery-apks
          path: dist/*.apk
