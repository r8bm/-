name: Build Delivery APKs

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Prepare Flutter projects
        run: ./scripts/prepare_flutter_projects.sh
        
      - name: Fix Flutter Android embedding v2
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifests = [
              Path("apps/driver_app/android/app/src/main/AndroidManifest.xml"),
              Path("apps/restaurant_app/android/app/src/main/AndroidManifest.xml"),
          ]

          for path in manifests:
              text = path.read_text()
              if 'android:name="flutterEmbedding"' not in text:
                  text = text.replace(
                      "</application>",
                      '        <meta-data android:name="flutterEmbedding" android:value="2" />\n    </application>'
                  )
                  path.write_text(text)
                  print(f"Fixed {path}")
              else:
                  print(f"Already fixed {path}")
          PY
      - name: Fix Dart async HTTP handler calls
        run: |
          python3 - <<'PY'
          from pathlib import Path

          for path in Path("apps").glob("*/lib/services/api_service.dart"):
              text = path.read_text()
              replacements = {
                  "=> _handle(http.get(": "async => _handle(await http.get(",
                  "=> _handle(http.post(": "async => _handle(await http.post(",
                  "=> _handle(http.put(": "async => _handle(await http.put(",
                  "=> _handle(http.patch(": "async => _handle(await http.patch(",
                  "=> _handle(http.delete(": "async => _handle(await http.delete(",
              }

              for old, new in replacements.items():
                  text = text.replace(old, new)

              path.write_text(text)
              print(f"Fixed async calls in {path}")
          PY
      - name: Build driver APK
        run: ./scripts/build_driver_apk.sh

      - name: Build restaurant APK
        run: ./scripts/build_restaurant_apk.sh

      - name: Upload APK files
        uses: actions/upload-artifact@v4
        with:
          name: delivery-apks
          path: dist/*.apk
