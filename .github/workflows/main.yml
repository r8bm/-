name: Build Delivery APKs

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Prepare Flutter projects
        run: ./scripts/prepare_flutter_projects.sh

      - name: Fix Flutter Android embedding v2
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifests = [
              Path("apps/driver_app/android/app/src/main/AndroidManifest.xml"),
              Path("apps/restaurant_app/android/app/src/main/AndroidManifest.xml"),
          ]

          for path in manifests:
              text = path.read_text()
              if 'android:name="flutterEmbedding"' not in text:
                  text = text.replace(
                      "</application>",
                      '        <meta-data android:name="flutterEmbedding" android:value="2" />\n    </application>'
                  )
                  path.write_text(text)
                  print(f"Fixed {path}")
              else:
                  print(f"Already fixed {path}")
          PY

      - name: Fix Dart async HTTP handler calls
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          methods = ["get", "post", "put", "patch", "delete"]

          for path in Path("apps").glob("*/lib/services/api_service.dart"):
              text = path.read_text()

              for method in methods:
                  text = re.sub(
                      r"\)\s*=>\s*_handle\(\s*http\." + method + r"\(",
                      ") async => _handle(await http." + method + "(",
                      text,
                  )

              path.write_text(text)
              print(f"Fixed async HTTP calls in {path}")
          PY

      - name: Build driver APK
        run: ./scripts/build_driver_apk.sh

      - name: Build restaurant APK
        run: ./scripts/build_restaurant_apk.sh

      - name: Upload APK files
        uses: actions/upload-artifact@v4
        with:
          name: delivery-apks
          path: dist/*.apk
